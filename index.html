<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL Users CRUD</title>
  <link rel="stylesheet" href="assets/css/global.css" />
</head>
<body>

<header>
  <h1>PostgreSQL CRUD</h1>
  <p>users table — name, email, password — practice app</p>
</header>

<div class="layout">

  <!-- LEFT: FORM -->
  <div class="form-panel">
    <div id="mode-badge">CREATE MODE</div>
    <h2>User Form</h2>

    <div class="form-group">
      <label>NAME</label>
      <input type="text" id="input-name" placeholder="John Doe" />
    </div>
    <div class="form-group">
      <label>EMAIL</label>
      <input type="email" id="input-email" placeholder="john@example.com" />
    </div>
    <div class="form-group">
      <label>PASSWORD</label>
      <input type="password" id="input-password" placeholder="••••••••" />
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="btn-submit" onclick="submitForm()">Create User</button>
      <button class="btn-secondary" id="btn-cancel" onclick="resetForm()" style="display:none">Cancel</button>
    </div>

    <div id="feedback"></div>
  </div>

  <!-- RIGHT: TABLE -->
  <div class="table-panel">
    <h2>
      Users
      <span class="count-badge" id="count-badge">0</span>
    </h2>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Created</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="users-body">
        <tr>
          <td colspan="5" class="empty-state">No users yet. Create one!</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- SQL LOG: shows what query ran last -->
<div class="sql-log">
  <h3>Last SQL Query</h3>
  <div id="sql-display">-- queries will appear here as you use the app</div>
</div>

<script src="assets/js/app.js"></script>

</body>
</html>
